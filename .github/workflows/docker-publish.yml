name: Build and Publish Docker Image
on:
    workflow_dispatch:

permissions:
    contents: read
    packages: write

jobs:
    publish:
        uses: DCC-BS/ci-workflows/.github/workflows/publish-docker.yml@7cc59467e7aa509171be63780597e00964f09b6d # v7
        secrets: inherit
        with:
            project_type: "python" # or "node"
            registry: ghcr.io
            image_name: ghcr.io/${{ github.repository }}
            context: .
            dockerfile: ./Dockerfile
            platforms: linux/amd64
            push: true
